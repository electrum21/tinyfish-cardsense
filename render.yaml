services:
  - type: web
    name: tinyfish-credit-intelligence-api
    runtime: node
    rootDir: apps/api
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: API_PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: INGEST_SHARED_SECRET
        sync: false
      - key: TINYFISH_API_KEY
        sync: false
      - key: TINYFISH_BASE_URL
        value: https://api.tinyfish.ai
